name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      run_id:
        description: "Build workflow run ID to publish (the run number from the tag push, e.g. 29652343943)"
        required: true
        type: number
      tag_name:
        description: "Tag to create the release on (e.g. v3.3.0)"
        required: true
        type: string
      mark_prerelease:
        description: "Publish as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ── Job 1: Build installers on tag push ──────────────────────────────
  build:
    name: Build (${{ matrix.label }})
    # Only run on tag push, not when triggered manually for publishing
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x64
            arch: x86_64-pc-windows-msvc
            label: x64
          - target: x86
            arch: i686-pc-windows-msvc
            label: x86
          - target: arm64
            arch: aarch64-pc-windows-msvc
            label: arm64

    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the app
        run: pnpm tauri build --target ${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v5
        with:
          name: bundles-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.arch }}/release/bundle/nsis/*-setup.exe
            src-tauri/target/${{ matrix.arch }}/release/bundle/latest.json
            src-tauri/target/${{ matrix.arch }}/release/bundle/*.sig
          if-no-files-found: error
          # Keep artifacts long enough to publish manually later
          retention-days: 30

  # ── Job 2: Publish release (manual, after review) ────────────────────
  publish:
    name: Publish GitHub Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts from build run
        uses: actions/download-artifact@v5
        with:
          # Pull artifacts from the specific build run the user entered
          run-id: ${{ inputs.run_id }}
          path: artifacts
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded files
        run: ls -lR artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ inputs.mark_prerelease }}
          make_latest: true
          files: |
            artifacts/**/*-setup.exe
            artifacts/**/latest.json
            artifacts/**/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
